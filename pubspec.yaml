name: gitasetu_flutter
description: GitaSetu - Bridge to Your Inner Self
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  supabase_flutter: ^2.3.0
  shared_preferences: ^2.2.2
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  video_player: ^2.11.1
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  assets:
    - assets/videos/
  uses-material-design: true
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 400
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
          weight: 400
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Italic.ttf
          style: italic
